version: "3.8"

services:
  # ── React Frontend ──────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev

  # ── Node.js / Express Backend ───────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - mongo
      - ml-service
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

  # ── Python / FastAPI ML Service ─────────────
  ml-service:
    build:
      context: ./ml
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=./models/xgboost_v1.joblib
      - SCALER_PATH=./models/scaler.joblib
      - PORT=8000
      - LOG_LEVEL=info
    volumes:
      - ./ml:/app
      - ./ml/models:/app/models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── MongoDB ─────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=creditsaathi

volumes:
  mongo-data:
